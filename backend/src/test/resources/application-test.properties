# ═══════════════════════════════════════════════════════════════════════════════
# Test profile — uses H2 in-memory database instead of MySQL.
# Activated automatically by @ActiveProfiles("test") on test classes, or
# by naming this file application-test.properties.
# ═══════════════════════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable bootstrap seeding during tests
ipos.bootstrap.enabled=false

# IPOS-PU inbound tests use this key (see IntegrationPuControllerWebMvcTest)
ipos.integration-pu.inbound-api-key=test-inbound-key
ipos.integration-pu.webhook-url=
ipos.integration-pu.webhook-api-key=
ipos.integration-pu.pu-base-url=
ipos.integration-pu.relay-email-enabled=false
