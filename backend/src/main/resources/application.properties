#
#   WHAT: This is the Spring Boot configuration file.
#
#  WHY:  Spring Boot reads this file on startup to learn how to connect to
#        the database, which port to run on, and other runtime settings.
#
#   HOW TO EXTEND:
#         Add any Spring Boot property here. Full reference:
#        https://docs.spring.io/spring-boot/appendix/application-properties/
#
# The port the embedded Tomcat server listens on.  Frontend calls hit this port.
server.port=8080

# Application Name
spring.application.name=ipos-sa

# MySQL DataSource
# JDBC URL format: jdbc:mysql://<host>:<port>/<database_name>
# Make sure the database "ipos_sa" already exists in MySQL before starting.
spring.datasource.url=jdbc:mysql://localhost:3306/ipos_sa

# Replace with your MySQL username and password.
spring.datasource.username=root
spring.datasource.password=RTX3080ti.

# The JDBC driver class.  Spring Boot can auto-detect this from the URL,
# but being explicit avoids surprises.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  JPA / Hibernate
#
# hibernate.ddl-auto controls what Hibernate does to the database schema on startup:
#
#   "none"     Do nothing.  Tables must already exist.
#   "validate"  Check that entities match existing tables; throw error if not.
#   "update"    Compare entities to tables and ALTER tables to match.
#                 SAFE for development  it never drops data.
#   "create"    DROP all tables, then CREATE them fresh.  DATA IS LOST.
#   "create-drop"  Same as "create", but also drops tables on shutdown.
#
# We use "update" so Hibernate auto-creates or alters tables to match our
# @Entity classes every time the app starts.  Perfect for development.
# NEVER use "update" in production  use a migration tool like Flyway instead.
spring.jpa.hibernate.ddl-auto=update

# Show the SQL that Hibernate generates in the console.
# Great for learning you can see the INSERT, SELECT, etc. statements.
spring.jpa.show-sql=true

# Make the logged SQL readable (indented) instead of a single long line.
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we are using MySQL 8.  This ensures it generates MySQL-specific
# SQL syntax (e.g., AUTO_INCREMENT instead of IDENTITY).
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Authentication & Bootstrap ────────────────────────────────────────────────
#
# When ipos.bootstrap.enabled=true, the application creates default ADMIN,
# MANAGER, and MERCHANT users on startup IF the users table is empty.
# This lets a fresh database be usable immediately without manual SQL.
#
# Default credentials (printed to console on first run):
#   admin    / admin123
#   manager  / manager123
#   merchant / merchant123
#
# Set to false in production once real accounts exist.
ipos.bootstrap.enabled=true
