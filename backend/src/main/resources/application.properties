#
#   WHAT: This is the Spring Boot configuration file.
#
#  WHY:  Spring Boot reads this file on startup to learn how to connect to
#        the database, which port to run on, and other runtime settings.
#
#   HOW TO EXTEND:
#         Add any Spring Boot property here. Full reference:
#        https://docs.spring.io/spring-boot/appendix/application-properties/
#
# The port the embedded Tomcat server listens on.  Frontend calls hit this port.
server.port=8080

# Application Name
spring.application.name=ipos-sa

# MySQL DataSource
# JDBC URL format: jdbc:mysql://<host>:<port>/<database_name>
# Make sure the database "ipos_sa" already exists in MySQL before starting.
spring.datasource.url=jdbc:mysql://localhost:3306/ipos_sa

# Replace with your MySQL username and password.
spring.datasource.username=root
spring.datasource.password=RTX3080ti.

# The JDBC driver class.  Spring Boot can auto-detect this from the URL,
# but being explicit avoids surprises.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  JPA / Hibernate
#
# hibernate.ddl-auto controls what Hibernate does to the database schema on startup:
#
#   "none"     Do nothing.  Tables must already exist.
#   "validate"  Check that entities match existing tables; throw error if not.
#   "update"    Compare entities to tables and ALTER tables to match.
#                 SAFE for development  it never drops data.
#   "create"    DROP all tables, then CREATE them fresh.  DATA IS LOST.
#   "create-drop"  Same as "create", but also drops tables on shutdown.
#
# We use "update" so Hibernate auto-creates or alters tables to match our
# @Entity classes every time the app starts.  Perfect for development.
# NEVER use "update" in production  use a migration tool like Flyway instead.
spring.jpa.hibernate.ddl-auto=update

# Show the SQL that Hibernate generates in the console.
# Great for learning you can see the INSERT, SELECT, etc. statements.
spring.jpa.show-sql=true

# Make the logged SQL readable (indented) instead of a single long line.
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we are using MySQL 8.  This ensures it generates MySQL-specific
# SQL syntax (e.g., AUTO_INCREMENT instead of IDENTITY).
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Authentication & Bootstrap ────────────────────────────────────────────────
#
# When ipos.bootstrap.enabled=true, the application seeds default data on a fresh database:
#   - Seven PDF staff users (Sysdba, accountant, manager, clerk, warehouse1, warehouse2, delivery) —
#     see DataBootstrap console output for passwords.
#   - Three PDF merchant accounts (city, cosymed, hello) — same IPOS_SampleData; contact email is
#     synthetic ({username}@merchant.sample.ipos). Additional merchants: Accounts API.
#   - Full InfoPharma sample catalogue (14 products) if products table is empty.
# Set to false in production once real accounts exist.
ipos.bootstrap.enabled=true

# ── IPOS-PU integration (commercial applications) ───────────────────────────
# Inbound: IPOS-PU must send header X-IPOS-Integration-Key with this value.
# Leave blank to disable inbound submission (returns 503 on POST /api/integration-pu/inbound/**).
# Example (local): inbound-api-key=dev-pu-sa-shared; webhook-url=http://localhost:8082/api/integration-pu/sa-decision; webhook-api-key=dev-webhook-bearer (match PU).
ipos.integration-pu.inbound-api-key=dev-pu-sa-shared
ipos.integration-pu.webhook-url=http://localhost:8082/api/integration-pu/sa-decision
ipos.integration-pu.webhook-api-key=dev-webhook-bearer
# Auto-create IPOS-SA merchant on commercial application approval; append credentials to email for PU.
ipos.integration-pu.auto-create-merchant-on-approve=true
ipos.integration-pu.auto-merchant-credit-limit=10000.00
ipos.integration-pu.auto-merchant-fixed-discount-percent=5.00
ipos.integration-pu.auto-merchant-placeholder-phone=0000000000
# §3b SA to PU-COMMS: relay welcome email after POST /api/merchant-accounts (not used for commercial approval webhook).
ipos.integration-pu.pu-base-url=http://localhost:8082
ipos.integration-pu.relay-email-enabled=true

# ── IPOS-CA integration (wholesale order webhook) ────────────────────────
# SA pushes order status changes to CA's embedded HTTP server on port 8081.
# Set webhook-enabled=false to disable outbound calls (CA offline or not needed).
ipos.integration-ca.webhook-url=http://localhost:8081/order-update
ipos.integration-ca.webhook-enabled=true
