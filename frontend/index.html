<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPOS-SA — Pharmaceutical Stock Management</title>
  </head>
  <body>
    <!--
      This <div> is the "mount point" for the React app.
      React takes over this element and renders the entire UI inside it.
      See src/main.jsx where we call createRoot(document.getElementById('root')).
    -->
    <div id="root"></div>

    <!--
      Vite handles this <script> tag.  In development, it serves the file
      directly with hot-module replacement.  In production, Vite bundles
      and minifies it.  "type=module" enables ES module imports.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
